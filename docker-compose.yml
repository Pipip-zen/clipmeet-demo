services:
  clipmeet-api:
    build:
      context: ./server
    container_name: clipmeet-api
    restart: unless-stopped
    environment:
      PORT: 3001
      CLIENT_ORIGIN: https://clipmeet.web.id
      JWT_SECRET: ZaMotO3TOIpmjeiYxO0noUUyqYnFqJOmQhaG5wg+l4U=
    volumes:
      - ./server/uploads:/uploads
      - ./server/clips:/clips
      - ./server/db.sqlite:/db.sqlite
    ports:
      - "3001:3001"

  clipmeet-web:
    build:
      context: ./client
      args:
        VITE_API_BASE_URL: https://api.clipmeet.web.id/api
        VITE_SIGNALING_SERVER_URL: https://api.clipmeet.web.id
    container_name: clipmeet-web
    restart: unless-stopped
    depends_on:
      - clipmeet-api
    ports:
      - "8080:80"
