name: Deploy ClipMeet

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Copy project to deployment folder
        run: |
          rsync -av --delete \
            --exclude='.git' \
            --exclude='server/uploads' \
            --exclude='server/clips' \
            --exclude='server/db.sqlite' \
            ./ /var/www/clipmeet/

      - name: Ensure persistent folders exist
        run: |
          cd /var/www/clipmeet
          mkdir -p server/uploads server/clips
          touch server/db.sqlite

      - name: Deploy with Docker Compose
        run: |
          cd /var/www/clipmeet
          docker compose up -d --build
